apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: "0.42.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
  install:
    createNamespace: true
  values:
    config:
      pluginsDir: /headlamp/plugins

    initContainers:
      - name: fetch-flux-plugin
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
        command: ["/bin/sh", "-c"]
        args:
          - "mkdir -p /headlamp/plugins && cp -r /plugins/* /headlamp/plugins/"
        securityContext:
          runAsUser: 100
          runAsGroup: 101
          runAsNonRoot: true
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /headlamp/plugins

    volumeMounts:
      - name: headlamp-plugins
        mountPath: /headlamp/plugins

    volumes:
      - name: headlamp-plugins
        emptyDir: {}

    clusterRoleBinding:
      create: true
      clusterRoleName: cluster-admin