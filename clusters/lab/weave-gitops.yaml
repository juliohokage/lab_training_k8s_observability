apiVersion: source.toolkit.fluxcd.io/v1beta2
  kind: HelmRepository
  metadata:
    name: weave-gitops
    namespace: flux-system
  spec:
    interval: 10m
    url: https://weave-gitops-charts.storage.googleapis.com

  ---
  apiVersion: helm.toolkit.fluxcd.io/v2beta1
  kind: HelmRelease
  metadata:
    name: weave-gitops
    namespace: flux-system
  spec:
    interval: 10m
    chart:
      spec:
        chart: weave-gitops
        sourceRef:
          kind: HelmRepository
          name: weave-gitops
    values:
      adminUser:
        create: true
        username: admin
        password: flux